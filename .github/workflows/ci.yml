name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    # Postgres-backed integration tests (apps/api/test/server.integration*,
    # *_pg) opt in via TEST_DATABASE_URL. Without it the suites skip and
    # the DB-bound server.ts surface stays uncovered, failing the 80%
    # gate — so CI provides a throwaway Postgres service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kaiad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kaiad_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/kaiad_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build

  go-agent-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./... -coverprofile=coverage.out
      - run: |
          COVER=$(go tool cover -func=coverage.out | awk '/total:/ {print substr($3, 1, length($3)-1)}')
          echo "Total Go coverage: $COVER"
          # Bootstrap threshold: raise as test depth increases.
          awk -v cov="$COVER" 'BEGIN { exit (cov+0 >= 40) ? 0 : 1 }'

  openapi-drift:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect packages/contracts changes
        id: contracts
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep -q '^packages/contracts/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.contracts.outputs.run == 'true'
        with:
          node-version: 22
      - name: Check OpenAPI spec drift
        if: steps.contracts.outputs.run == 'true'
        run: bash packages/contracts/scripts/check-openapi-drift.sh
