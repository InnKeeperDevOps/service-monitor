name: operator-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: build + publish operator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: deploy/operator
          file: deploy/operator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/innkeeperdevops/kaiad-operator:${{ steps.ver.outputs.tag }}
            ghcr.io/innkeeperdevops/kaiad-operator:latest
          provenance: false

  chart:
    name: package + publish Helm chart
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          set -euo pipefail
          helm package deploy/operator/charts/kaiad-operator \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${GITHUB_REF_NAME}"
          ls *.tgz

      - name: Push chart
        run: |
          helm push "kaiad-operator-${{ steps.ver.outputs.version }}.tgz" oci://ghcr.io/innkeeperdevops/charts
