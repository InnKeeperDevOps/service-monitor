name: agent-release

# Builds + publishes the kaiad-agent container image to
# ghcr.io/innkeeperdevops/kaiad-agent.
#
# Triggers:
#   - Push of an annotated tag matching `agent-v*` or `v*` — produces
#     `:<tag>` plus `:latest`.
#   - Manual `workflow_dispatch` with a `tag` input — produces
#     `:<input>` (plus `:latest` if `latest_tag` is true). Used for
#     ad-hoc builds without bumping a real version.
#
# The image is multi-arch (linux/amd64 + linux/arm64). The agent Go
# binary is built CGO_ENABLED=0 inside the build stage, so cross-arch
# is a clean static cross-compile.

on:
  push:
    tags:
      - "v*"
      - "agent-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. agent-v0.1.2 or any short string)"
        required: true
        default: "dev"
      latest_tag:
        description: "Also push :latest"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: build + publish agent image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: ver
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          IMAGE: ghcr.io/innkeeperdevops/kaiad-agent
          TAG: ${{ steps.ver.outputs.tag }}
          LATEST: ${{ inputs.latest_tag }}
        run: |
          set -euo pipefail
          out="${IMAGE}:${TAG}"
          # Push :latest on every tag-push trigger; on manual dispatch
          # respect the `latest_tag` input.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${LATEST}" = "true" ]; then
              out="${out}"$'\n'"${IMAGE}:latest"
            fi
          else
            out="${out}"$'\n'"${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$out"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: apps/agent
          file: apps/agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          # GHA-backed buildx cache so repeat builds reuse layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
