name: docs-site-www

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: docs-site-www-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Build Jekyll site
        working-directory: docs
        run: |
          bundle install
          bundle exec jekyll build

      - name: Publish to site-www branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: site-www
          publish_dir: docs/_site
          force_orphan: true
          commit_message: "docs: publish site for ${{ github.sha }}"
