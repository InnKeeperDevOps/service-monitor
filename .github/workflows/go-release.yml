name: go-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go binaries
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist
          built_count=0

          for app_dir in apps/*; do
            if [[ ! -d "$app_dir" || ! -f "$app_dir/go.mod" ]]; then
              continue
            fi

            app_name="$(basename "$app_dir")"

            for cmd_dir in "$app_dir"/cmd/*; do
              if [[ ! -d "$cmd_dir" || ! -f "$cmd_dir/main.go" ]]; then
                continue
              fi

              cmd_name="$(basename "$cmd_dir")"
              target="${app_name}-${cmd_name}"

              for platform in "${platforms[@]}"; do
                IFS="/" read -r goos goarch <<< "$platform"
                ext=""
                if [[ "$goos" == "windows" ]]; then
                  ext=".exe"
                fi

                out_file="dist/${target}_${goos}_${goarch}${ext}"
                echo "Building ${target} for ${goos}/${goarch}"
                (
                  cd "$app_dir"
                  CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
                    -trimpath \
                    -ldflags="-s -w" \
                    -o "../../${out_file}" \
                    "./cmd/${cmd_name}"
                )
                built_count=$((built_count + 1))
              done
            done
          done

          if [[ "$built_count" -eq 0 ]]; then
            echo "No Go commands found under apps/*/cmd/*"
            exit 1
          fi

          sha256sum dist/* > dist/checksums.txt
          echo "Built ${built_count} release artifacts"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
