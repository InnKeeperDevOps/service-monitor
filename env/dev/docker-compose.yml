services:
  kaiad:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.unified
    user: "1000:1000"
    # Add the host's `docker` group so UID 1000 in the container can
    # access /var/run/docker.sock for the build pipeline. The default
    # 983 matches this dev host (`getent group docker` → 983); override
    # via DOCKER_GID env if your host differs (Debian's default is 999).
    group_add:
      - "${DOCKER_GID:-983}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      builds-perms-init:
        condition: service_completed_successfully
    environment:
      - NODE_ENV=development
      - PORT=8092
      - SM_EMBED_WORKER=1
      - KAIAD_DATA_DIR=/data
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/service_monitor
      - REDIS_URL=redis://redis:6379
      - VITE_API_BASE=http://panel.dev.kaiad.dev
      # Build pipeline: workspace dir paths the host docker daemon will
      # see when the worker spawns build containers. The bind mount
      # below makes /data/builds inside the container == this host path.
      # The build worker writes to /data/builds/<id>/... and constructs
      # `docker run -v <KAIAD_BUILDS_HOST_DIR>/<id>/workspace:/workspace`.
      - KAIAD_BUILDS_HOST_DIR=${PWD}/data/kaiad-builds
      # Internal hostname the build worker uses when crane-pushing the
      # runtime image. The native OCI registry is served by this same
      # kaiad process, so pushes go to its own loopback. PORT=8092 in
      # dev. Image refs recorded in the DB still use KAIAD_REGISTRY_HOST
      # (below) — that's what agent kubelets see.
      - KAIAD_REGISTRY_INTERNAL=127.0.0.1:8092
      - KAIAD_REGISTRY_HOST=panel.dev.kaiad.dev
      # WWW-Authenticate realm URL. Must be absolute — crane's go-http
      # client rejects relative paths with "unsupported protocol scheme".
      # Internal pushes (build worker, push-agent) hit loopback. External
      # docker clients should use pre-minted enrollment tokens and won't
      # follow the realm; if they do, the host nginx is expected to
      # proxy /registry/token to kaiad at this same path.
      - KAIAD_REGISTRY_REALM=http://127.0.0.1:8092/registry/token
    volumes:
      - ./data/kaiad:/data
      # Registry-auth keypair. Kaiad writes key.pem + cert.pem here on
      # first boot and uses them to mint + verify the bearer JWTs that
      # gate /v2/* and /registry/token. Persisted so tokens issued
      # before a restart remain valid.
      - ./data/registry-auth:/data/registry-auth
      # Build pipeline workspace + artifact root. Bound so the same
      # path is reachable from the host docker daemon (which spawns
      # the build containers via the socket below). The container
      # writes to /data/builds/<id>/...; the host sees it at
      # ${KAIAD_BUILDS_HOST_DIR} per the env var above.
      - ./data/kaiad-builds:/data/builds
      # Build pipeline engine: kaiad's worker shells out to `docker run`
      # against the host daemon to execute build steps. Alternatives
      # (kaniko, dind) still need this socket to launch their own
      # containers, so they'd add work without adding isolation here.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8092:8092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8092/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: postgres:16
    user: "1000:1000"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_monitor}
      PGDATA: /data/pgdata
    volumes:
      - ./data/pg-data:/data
    ports:
      - "5001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_monitor}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  # One-shot perms init: docker auto-creates bind-mount source dirs as
  # root:root, but the kaiad container runs as UID 1000. Without this,
  # the build worker fails with EACCES on first build. Idempotent — safe
  # to re-run on every `compose up`.
  builds-perms-init:
    image: busybox:latest
    user: "0:0"
    volumes:
      - ./data/kaiad-builds:/builds
    entrypoint: ["sh", "-c", "mkdir -p /builds && chown -R 1000:1000 /builds && chmod 0775 /builds"]
    restart: "no"

  redis:
    image: redis:7
    user: "1000:1000"
    ports:
      - "6001:6379"
    volumes:
      - ./data/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # registry:2 sidecar removed — Kaiad now serves /v2/* directly from
  # apps/api/src/registry/routes.ts. Image blobs live in pg_largeobject
  # under the postgres service; admin operations go through the panel's
  # /api/v1/registry/* endpoints (apps/api/src/registry/admin.ts).
  #
  # Host nginx must now route panel.dev.kaiad.dev/v2/* to the kaiad
  # container at :8092 (was :5050 → registry:2). The proxy config lives
  # in ~/kaiad-proxy/nginx.conf — update there before bringing this up.
  #
  # Old blob storage at ./data/registry-data is now orphan and can be
  # removed by hand once you've re-pushed your kaiad-agent image
  # (push-agent-on-boot.sh re-pushes on every kaiad start).