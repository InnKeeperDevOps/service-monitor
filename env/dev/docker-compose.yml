services:
  kaiad:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.unified
    user: "1000:1000"
    # Add the host's `docker` group so UID 1000 in the container can
    # access /var/run/docker.sock for the build pipeline. The default
    # 983 matches this dev host (`getent group docker` → 983); override
    # via DOCKER_GID env if your host differs (Debian's default is 999).
    group_add:
      - "${DOCKER_GID:-983}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      builds-perms-init:
        condition: service_completed_successfully
    environment:
      - NODE_ENV=development
      - PORT=8092
      - SM_EMBED_WORKER=1
      - KAIAD_DATA_DIR=/data
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/service_monitor
      - REDIS_URL=redis://redis:6379
      - VITE_API_BASE=http://panel.dev.kaiad.dev
      # Build pipeline: workspace dir paths the host docker daemon will
      # see when the worker spawns build containers. The bind mount
      # below makes /data/builds inside the container == this host path.
      # The build worker writes to /data/builds/<id>/... and constructs
      # `docker run -v <KAIAD_BUILDS_HOST_DIR>/<id>/workspace:/workspace`.
      - KAIAD_BUILDS_HOST_DIR=${PWD}/data/kaiad-builds
      # Internal hostname the build worker uses when crane-pushing the
      # runtime image. registry:5000 is the compose-DNS name; pushing
      # through this avoids the openresty/nginx round trip and works
      # without configuring host /etc/hosts. The image ref recorded in
      # the DB still uses the external host (KAIAD_REGISTRY_HOST below).
      - KAIAD_REGISTRY_INTERNAL=registry:5000
      - KAIAD_REGISTRY_HOST=panel.dev.kaiad.dev
    volumes:
      - ./data/kaiad:/data
      # Registry-auth keypair shared rw with kaiad (writes on first boot
      # if missing) and ro to the registry container (reads cert.pem
      # for JWT verification).
      - ./data/registry-auth:/data/registry-auth
      # Build pipeline workspace + artifact root. Bound so the same
      # path is reachable from the host docker daemon (which spawns
      # the build containers via the socket below). The container
      # writes to /data/builds/<id>/...; the host sees it at
      # ${KAIAD_BUILDS_HOST_DIR} per the env var above.
      - ./data/kaiad-builds:/data/builds
      # Build pipeline engine: kaiad's worker shells out to `docker run`
      # against the host daemon to execute build steps. Alternatives
      # (kaniko, dind) still need this socket to launch their own
      # containers, so they'd add work without adding isolation here.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8092:8092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8092/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: postgres:16
    user: "1000:1000"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_monitor}
      PGDATA: /data/pgdata
    volumes:
      - ./data/pg-data:/data
    ports:
      - "5001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_monitor}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  # One-shot perms init: docker auto-creates bind-mount source dirs as
  # root:root, but the kaiad container runs as UID 1000. Without this,
  # the build worker fails with EACCES on first build. Idempotent — safe
  # to re-run on every `compose up`.
  builds-perms-init:
    image: busybox:latest
    user: "0:0"
    volumes:
      - ./data/kaiad-builds:/builds
    entrypoint: ["sh", "-c", "mkdir -p /builds && chown -R 1000:1000 /builds && chmod 0775 /builds"]
    restart: "no"

  redis:
    image: redis:7
    user: "1000:1000"
    ports:
      - "6001:6379"
    volumes:
      - ./data/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # OCI distribution registry hosted alongside Kaiad. Phase 1: anonymous
  # read + push. Phase 2 will gate push (and optionally pull) behind the
  # kaiad-issued JWT bearer auth at /v2/_token. The registry is reverse-
  # proxied at panel.dev.kaiad.dev/v2/* by ../../kaiad-proxy/nginx.conf.
  registry:
    image: registry:2
    user: "1000:1000"
    depends_on:
      kaiad:
        condition: service_healthy
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      # delete: lets the panel's Registry page DELETE a manifest,
      # which is then garbage-collected on the next `registry garbage-collect`
      # run (we don't run that automatically yet — manual `docker exec`).
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
      # relativeurls: redirect URLs (e.g. blob upload session Location)
      # are emitted as path-only, so internal pushes (registry:5000)
      # and external pushes (panel.dev.kaiad.dev) both work without
      # the registry having to know which side it's serving. Setting
      # REGISTRY_HTTP_HOST overrides this for external host construction
      # — leaving it unset lets the registry honour the request's Host
      # header, which is what we want.
      REGISTRY_HTTP_RELATIVEURLS: "true"
      # Token auth: every pull/push must present a JWT minted by the
      # Kaiad API at /registry/token. The registry verifies the JWT
      # signature against the cert in /auth/cert.pem (written by the
      # kaiad container on first boot — see ../../apps/api/src/registryAuth.ts).
      REGISTRY_AUTH: token
      REGISTRY_AUTH_TOKEN_REALM: "https://panel.dev.kaiad.dev/registry/token"
      REGISTRY_AUTH_TOKEN_SERVICE: "kaiad-registry"
      REGISTRY_AUTH_TOKEN_ISSUER: "kaiad"
      REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE: /auth/cert.pem
    volumes:
      - ./data/registry-data:/var/lib/registry
      - ./data/registry-auth:/auth:ro
    ports:
      - "5050:5000"