services:
  kaiad:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.unified
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=8092
      - SM_EMBED_WORKER=1
      - KAIAD_DATA_DIR=/data
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/service_monitor
      - REDIS_URL=redis://redis:6379
      - VITE_API_BASE=http://panel.dev.kaiad.dev
    volumes:
      - ./data/kaiad:/data
    ports:
      - "8092:8092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8092/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: postgres:16
    user: "1000:1000"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_monitor}
      PGDATA: /data/pgdata
    volumes:
      - ./data/pg-data:/data
    ports:
      - "5001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_monitor}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    user: "1000:1000"
    ports:
      - "6001:6379"
    volumes:
      - ./data/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s