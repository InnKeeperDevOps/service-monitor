services:
  kaiad:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.unified
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=8091
      - SM_EMBED_WORKER=1
      - KAIAD_DATA_DIR=/data
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/service_monitor
      - REDIS_URL=redis://redis:6379
      - VITE_API_BASE=http://panel.kaiad.dev
      - KAIAD_ENCRYPTION_KEY=${KAIAD_ENCRYPTION_KEY}
      # Build pipeline: host-visible path for /data/builds, so build
      # containers spawned via the host docker daemon can bind-mount the
      # workspace dir. Must match the bind mount below.
      - KAIAD_BUILDS_HOST_DIR=${PWD}/data/kaiad-builds
      # Native OCI registry: kaiad serves /v2/* itself. The worker
      # crane-pushes to loopback (no separate registry container) and
      # image refs recorded in the DB use the external host that agent
      # kubelets pull from.
      - KAIAD_REGISTRY_INTERNAL=127.0.0.1:8091
      - KAIAD_REGISTRY_HOST=panel.kaiad.dev
      # WWW-Authenticate realm URL. MUST be the public, externally
      # reachable token endpoint: every standard Docker/containerd client
      # follows this realm after the 401 to fetch a (possibly anonymous)
      # bearer token. A loopback URL here makes the k8s node's runtime
      # dial its own 127.0.0.1 and fail with ImagePullBackOff. Internal
      # self-pushes use KAIAD_REGISTRY_INTERNAL (loopback), not the realm.
      - KAIAD_REGISTRY_REALM=https://panel.kaiad.dev/registry/token
    volumes:
      - ./data/kaiad:/data
      # Registry-auth keypair. Kaiad writes key.pem + cert.pem on first
      # boot and signs bearer JWTs with it. Persisted so tokens issued
      # before a restart stay valid.
      - ./data/registry-auth:/data/registry-auth
      # Build pipeline workspace + artifact root (same path as
      # KAIAD_BUILDS_HOST_DIR above).
      - ./data/kaiad-builds:/data/builds
      # Build pipeline engine: worker shells out to `docker build`/`docker
      # run` against the host daemon. Container runs as root, so no
      # group_add needed.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8091:8091"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8091/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: postgres:16
    user: "1000:1000"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_monitor}
      PGDATA: /data/pgdata
    volumes:
      - ./data/pg-data:/data
    ports:
      - "5002:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_monitor}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    user: "1000:1000"
    ports:
      - "6002:6379"
    volumes:
      - ./data/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s