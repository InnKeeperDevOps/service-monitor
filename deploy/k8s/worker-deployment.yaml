apiVersion: apps/v1
kind: Deployment
metadata:
  name: sm-worker
  namespace: service-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sm-worker
  template:
    metadata:
      labels:
        app: sm-worker
    spec:
      containers:
        - name: worker
          image: service-monitor/worker:latest
          ports:
            - containerPort: 9090
          env:
            - name: PORT
              value: "9090"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sm-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sm-secrets
                  key: redis-url
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sm-worker
  namespace: service-monitor
spec:
  selector:
    app: sm-worker
  ports:
    - port: 9090
      targetPort: 9090
