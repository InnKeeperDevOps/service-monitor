services:
  web:
    image: node:22
    working_dir: /workspace
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../..:/workspace
    # Host checkout must have node_modules (CI runs pnpm install before compose; locally: pnpm install at repo root).
    command: >-
      sh -c "corepack enable && pnpm exec turbo run build --filter=@sm/web &&
      pnpm --filter @sm/web exec vite preview --host 0.0.0.0 --port 4173"
    environment:
      - NODE_ENV=production
      # Baked into the client bundle at build time. Override for local all-in-one: VITE_API_BASE=http://localhost:3001
      - VITE_API_BASE=${VITE_API_BASE:-https://api.kaiad.dev}
    ports:
      # Set WEB_HOST_PORT if 4173 is already in use on the host (e.g. local vite preview).
      - "${WEB_HOST_PORT:-4173}:4173"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4173/').then(r=>process.exit(r.ok&&/text\\/html/i.test(r.headers.get('content-type')||'')?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 180s
  api:
    image: node:22
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../..:/workspace
      - kaiad-data:/data
    command: sh -c "corepack enable && pnpm exec turbo run build --filter=@sm/api && pnpm --filter @sm/api start"
    environment:
      - NODE_ENV=production
      # Acceptance stack + e2e use Bearer dev-token against production-mode API.
      - SM_ALLOW_DEV_TOKEN=1
      - PORT=3001
      # Persist setup wizard config (including databaseUrl) across container restarts.
      - KAIAD_DATA_DIR=/data
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_monitor}
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_TOKEN=dev-token
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 3s
      timeout: 5s
      retries: 25
      start_period: 120s
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_monitor}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_monitor}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
  worker:
    image: node:22
    working_dir: /workspace
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../..:/workspace
    command: >-
      sh -c "corepack enable && pnpm exec turbo run build --filter=@sm/worker && pnpm --filter @sm/worker start"
    environment:
      - NODE_ENV=production
      - WORKER_HEALTH_PORT=9090
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-service_monitor}
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_URL=http://api:3001
      - INTERNAL_API_TOKEN=dev-token
    ports:
      - "9090:9090"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 180s

volumes:
  kaiad-data:
    name: ${KAIAD_DATA_VOLUME_NAME:-kaiad-data}
