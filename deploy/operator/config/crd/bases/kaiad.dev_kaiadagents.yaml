apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kaiadagents.kaiad.dev
  annotations:
    kaiad.dev/source: hand-rolled-task-3
    kaiad.dev/regenerate-with: controller-gen crd paths=./api/...
spec:
  group: kaiad.dev
  scope: Namespaced
  names:
    kind: KaiadAgent
    listKind: KaiadAgentList
    plural: kaiadagents
    singular: kaiadagent
    shortNames:
      - kagent
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: AgentId
          type: string
          jsonPath: .status.enrolledAgentId
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [controlPlane, enrollment, image]
              properties:
                controlPlane:
                  type: object
                  required: [realtimeUrl]
                  properties:
                    realtimeUrl:
                      type: string
                      pattern: "^wss?://.+"
                enrollment:
                  type: object
                  required: [secretRef]
                  properties:
                    secretRef:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                          default: token
                serviceId:
                  type: string
                image:
                  type: string
                  minLength: 1
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                imagePullSecrets:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                manages:
                  type: array
                  maxItems: 32
                  items:
                    type: object
                    required: [apiGroups, resources, verbs]
                    properties:
                      apiGroups:
                        type: array
                        items:
                          type: string
                      resources:
                        type: array
                        minItems: 1
                        items:
                          type: string
                      verbs:
                        type: array
                        minItems: 1
                        items:
                          type: string
                      namespaceSelector:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                enrolledAgentId:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                deploymentName:
                  type: string
