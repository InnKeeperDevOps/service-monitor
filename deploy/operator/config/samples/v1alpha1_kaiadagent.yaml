# Sample KaiadAgent CR.
#
# Setup:
#   kubectl create namespace kaiad-system
#
#   # 1) Generate an enrollment token in the panel:
#   #    Settings → Enrollment tokens → Generate token
#   # 2) Create a Secret in the agent's namespace holding that token:
#   kubectl -n kaiad-system create secret generic kaiad-enrollment \
#     --from-literal=token='<paste-token-here>'
#
#   kubectl apply -f deploy/operator/config/samples/v1alpha1_kaiadagent.yaml
#
# The token's tenant binding is implicit (whichever panel session minted
# it); the CR itself never names a tenant. Auto-mint was removed — every
# reconcile would otherwise mint fresh and produce thousands of expired
# tokens.
apiVersion: kaiad.dev/v1alpha1
kind: KaiadAgent
metadata:
  name: edge-agent
  namespace: kaiad-system
spec:
  controlPlane:
    realtimeUrl: wss://panel.example.com/realtime
  enrollment:
    secretRef:
      name: kaiad-enrollment
      key: token
  image: ghcr.io/innkeeperdevops/kaiad-agent:v1.2.3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  manages:
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets"]
      verbs: ["get", "list", "watch", "patch", "update"]
      namespaceSelector:
        matchLabels:
          kaiad.dev/managed: "true"
    - apiGroups: [""]
      resources: ["pods", "pods/log"]
      verbs: ["get", "list", "watch"]
      namespaceSelector:
        matchLabels:
          kaiad.dev/managed: "true"
