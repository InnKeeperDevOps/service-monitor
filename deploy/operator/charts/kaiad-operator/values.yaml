# Default values for kaiad-operator.

replicaCount: 1

image:
  repository: ghcr.io/innkeeperdevops/kaiad-operator
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when omitted.
  tag: ""

imagePullSecrets: []

serviceAccount:
  # Operator's own SA (separate from any KaiadAgent ServiceAccounts the operator generates).
  create: true
  name: ""

# Kaiad control-plane integration. ALL OPTIONAL.
#
# When apiBaseURL + an apiCredentialSecret are both configured, the operator
# polls the panel's GET /api/v1/agents/:id and sets Ready=True only after
# the control plane has seen the agent online. With either left empty,
# Ready reflects pod readiness only — sufficient for most installs.
#
# Enrollment tokens are NOT auto-minted. Generate one in the panel UI
# (Settings → Enrollment tokens → Generate token) and create a Secret in
# the agent's namespace before applying the KaiadAgent CR. See the chart
# README for an example.
kaiad:
  apiBaseURL: ""
  apiCredentialSecret:
    # If true, the chart creates a Secret with the token from `value` below.
    # If false, supply `name` pointing at a pre-provisioned Secret with key
    # `token` holding the bearer (only `agents.read` scope is needed).
    create: false
    name: ""
    # Only used when `create: true`.
    value: ""

# Operator pod knobs.
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Leader election. Default on; turn off for single-replica dev.
leaderElection:
  enabled: true

# Where the operator listens for metrics and probes.
metrics:
  bindAddress: ":8080"
healthProbe:
  bindAddress: ":8081"
