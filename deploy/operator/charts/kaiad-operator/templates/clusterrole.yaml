# Cluster role granted to the operator itself. Distinct from the per-CR
# RBAC the operator generates from spec.manages — that's the *agent's* role.
#
# Kubernetes prevents RBAC escalation: a controller cannot create a Role
# that grants a permission the controller itself does not hold. We therefore
# pre-declare the union of every (apiGroup, resource, verb) tuple in the
# allow-list at internal/controller/allowlist.go, in addition to the
# operator's own management permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kaiad-operator.fullname" . }}
  labels: {{- include "kaiad-operator.labels" . | nindent 4 }}
rules:
  # --- Operator's own management surface ---
  - apiGroups: ["kaiad.dev"]
    resources: ["kaiadagents"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kaiad.dev"]
    resources: ["kaiadagents/status", "kaiadagents/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election lease.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Pods: list to find agent replicas, delete to force-recreate when an
  # enrollment Secret needs to be picked up by a pod that snapshots
  # SM_ENROLLMENT_TOKEN at creation time.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]

  # --- Allow-list union (must mirror internal/controller/allowlist.go) ---
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
